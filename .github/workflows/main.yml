name: Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  statuses: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  get-version:
    name: Get Version
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Get current version
        id: get_version
        run: |
          VERSION_NAME=$(./gradlew -q printVersionName)
          VERSION_CODE=$(./gradlew -q printVersionCode)
          echo "Building version: $VERSION_NAME (code: $VERSION_CODE)"

          echo "**Building Version:** \`$VERSION_NAME\` **(code: $VERSION_CODE)**" >> $GITHUB_STEP_SUMMARY

  build-debug:
    name: Build Android - Main
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: adopt
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: wrapper
          cache-read-only: false

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > app/google-services.json

      - name: Build Android - Main
        continue-on-error: false
        run: ./gradlew :app:assembleDebug
        env:
          DEBUG_APP_CHECK_TOKEN: ${{ secrets.DEBUG_APP_CHECK_TOKEN }}

      - name: Run Unit Tests
        continue-on-error: false
        run: ./gradlew test

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: camperchecks-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 5

  test-functions:
    name: Test Cloud Functions
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: firebase/functions

      - name: Run tests
        run: npm test
        working-directory: firebase/functions

  deploy-firebase:
    name: Deploy Firebase
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Check for firebase/ changes
        id: changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            firebase:
              - 'firebase/**'

      - name: Set up Node.js
        if: steps.changes.outputs.firebase == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Deploy Firestore rules and Functions
        if: steps.changes.outputs.firebase == 'true' || github.event_name == 'workflow_dispatch'
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules,firestore:indexes,functions --project camperchecks-490115
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PROJECT_PATH: ./firebase
